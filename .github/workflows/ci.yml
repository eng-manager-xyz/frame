name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.1
        with:
          components: clippy,rustfmt
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Install GStreamer
        run: >-
          sudo apt-get update && sudo apt-get install -y
          libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev
          gstreamer1.0-plugins-base gstreamer1.0-plugins-good
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace
      - run: cargo check -p frame-control-plane --target wasm32-unknown-unknown
      - name: Install Worker packager
        run: cargo install worker-build --version 0.8.5 --locked
      - name: Worker bundle dry run
        run: >-
          npx --yes wrangler@4.111.0 deploy --dry-run
          --config apps/control-plane/wrangler.toml
          --outdir target/wrangler-dry-run
      - name: GStreamer smoke artifact
        run: cargo run -p frame-media-worker -- smoke target/frame-smoke.webm
