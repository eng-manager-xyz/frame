name: Share player contract

on:
  pull_request:
    paths:
      - "apps/web/**"
      - "crates/frame-client/**"
      - "fixtures/web-share-player/**"
      - "scripts/ci/check-share-player.py"
      - "scripts/ci/public-collaboration-sqlite-conformance.py"
      - "apps/control-plane/migrations/0022_public_collaboration_runtime.sql"
      - "apps/control-plane/src/public_collaboration_runtime.rs"
      - "docs/architecture/share-player-v1.md"
      - "docs/evidence/share-player-local.md"
      - "docs/operations/share-player-rollout.md"
      - ".github/workflows/share-player.yml"
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "crates/frame-client/**"
      - "fixtures/web-share-player/**"
      - "scripts/ci/check-share-player.py"
      - "scripts/ci/public-collaboration-sqlite-conformance.py"
      - "apps/control-plane/migrations/0022_public_collaboration_runtime.sql"
      - "apps/control-plane/src/public_collaboration_runtime.rs"
      - "docs/architecture/share-player-v1.md"
      - "docs/evidence/share-player-local.md"
      - "docs/operations/share-player-rollout.md"
      - ".github/workflows/share-player.yml"

permissions:
  contents: read

jobs:
  contract:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out the exact revision
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Install pinned Rust toolchain
        run: rustup toolchain install 1.96.1 --profile minimal --component clippy --target wasm32-unknown-unknown
      - name: Restore Rust build cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
        with:
          cache-on-failure: false
      - name: Validate committed parity and evidence boundary
        run: python3 -I scripts/ci/check-share-player.py --evidence target/evidence/share-player-local.json
      - name: Reject cross-tenant public collaboration state
        run: python3 -I scripts/ci/public-collaboration-sqlite-conformance.py
      - name: Test server-rendered contract
        run: cargo test --locked -p frame-web --features ssr
      - name: Lint native server and tests
        run: cargo clippy --locked -p frame-web --all-targets --features ssr -- -D warnings
      - name: Check browser hydration target
        run: cargo check --locked -p frame-web --target wasm32-unknown-unknown --no-default-features --features hydrate --bin frame-web-hydrate
      - name: Lint browser hydration target
        run: cargo clippy --locked -p frame-web --target wasm32-unknown-unknown --no-default-features --features hydrate --lib -- -D warnings
      - name: Retain local contract evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: share-player-local-evidence
          path: target/evidence/share-player-local.json
          if-no-files-found: error
          retention-days: 14
